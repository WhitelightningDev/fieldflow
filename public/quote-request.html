<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Request a Quote | FieldFlow</title>
    <meta
      name="description"
      content="Open the FieldFlow quote request form. Scan the QR code to send your details and request a quote."
    />

    <!-- Social sharing (Open Graph / Twitter). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FieldFlow" />
    <meta property="og:title" content="Request a Quote" />
    <meta
      property="og:description"
      content="Open the FieldFlow quote request form. Scan the QR code to send your details and request a quote."
    />
    <meta property="og:image" content="/FieldFlow-request-a-quote.png" />
    <meta property="og:image:alt" content="FieldFlow quote request" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Request a Quote" />
    <meta
      name="twitter:description"
      content="Open the FieldFlow quote request form. Scan the QR code to send your details and request a quote."
    />
    <meta name="twitter:image" content="/FieldFlow-request-a-quote.png" />

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, Arial, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .card {
        width: min(560px, 100%);
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }
      .hero {
        display: block;
        width: 100%;
        height: auto;
        background: #0b1220;
      }
      .content {
        padding: 18px 18px 20px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: -0.01em;
        color: #f8fafc;
      }
      p {
        margin: 0 0 14px;
        font-size: 14px;
        line-height: 1.45;
        color: #cbd5e1;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #fff;
        font-weight: 750;
        text-decoration: none;
        box-sizing: border-box;
      }
      .muted {
        margin-top: 10px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img class="hero" src="/FieldFlow-request-a-quote.png" alt="FieldFlow quote request" />
      <div class="content">
        <h1>Opening quote request form...</h1>
        <p>If you are not redirected automatically, tap the button below.</p>
        <a id="open-link" class="btn" href="#">Open quote form</a>
        <div class="muted">
          Powered by FieldFlow
        </div>
      </div>
    </div>

    <script>
      (function () {
        function getToken() {
          try {
            var params = new URLSearchParams(window.location.search);
            return (params.get("t") || "").trim();
          } catch {
            return "";
          }
        }

        var token = getToken();
        var dest = token ? "/quote/" + encodeURIComponent(token) : "";
        var link = document.getElementById("open-link");
        if (dest) link.setAttribute("href", dest);

        if (!dest) {
          document.querySelector("h1").textContent = "Invalid quote link";
          document.querySelector("p").innerHTML =
            "This QR/link is missing a token. Ask the business to regenerate their QR code.";
          link.textContent = "Open FieldFlow";
          link.setAttribute("href", "/");
          return;
        }

        // Redirect quickly for scanner/camera flows.
        window.location.replace(dest);
      })();
    </script>
  </body>
</html>
